<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor de Precios - Coca-Cola Plantillas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #F4F4F6;
      --bg-secondary: #FFFFFF;
      --text-primary: #1C1C1E;
      --text-secondary: #555559;
      --red: #E61E2A;
      --border: rgba(0, 0, 0, 0.08);
      --radius-md: 12px;
      --radius-sm: 8px;
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: var(--bg-secondary);
      padding: 30px;
      border-radius: var(--radius-md);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.05);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 800;
      margin-top: 0;
      color: var(--red);
      border-bottom: 2px solid var(--red);
      padding-bottom: 10px;
    }

    p {
      color: var(--text-secondary);
      font-size: 0.9rem;
      line-height: 1.4;
    }

    .category-section {
      margin-top: 25px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }

    .category-header {
      background: rgba(230, 30, 42, 0.05);
      padding: 12px 16px;
      font-weight: 700;
      font-size: 0.95rem;
      border-bottom: 1px solid var(--border);
      color: var(--text-primary);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      background: #F8F9FA;
      color: var(--text-secondary);
      font-size: 0.75rem;
      text-transform: uppercase;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .price-input {
      width: 100px;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      text-align: right;
    }

    .price-input:focus {
      border-color: var(--red);
      outline: none;
    }

    .actions-bar {
      margin-top: 30px;
      display: flex;
      justify-content: flex-end;
      gap: 15px;
    }

    .btn {
      padding: 12px 24px;
      border-radius: var(--radius-sm);
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
    }

    .btn-primary {
      background: var(--red);
      color: white;
    }

    .btn-primary:hover {
      background: #D51A24;
    }

    .btn-secondary {
      background: #E5E5EA;
      color: var(--text-primary);
    }

    .btn-secondary:hover {
      background: #D1D1D6;
    }

    #code-output {
      width: 100%;
      height: 200px;
      font-family: monospace;
      font-size: 0.8rem;
      margin-top: 20px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Editor de Precios Catálogo</h1>
    <p>
      Corrige los precios en los cuadros de entrada de cada producto. Al finalizar, pulsa <strong>"Descargar data.js"</strong> para guardar el archivo modificado directamente en tu carpeta del proyecto (reemplazando el archivo antiguo en <code>js/data.js</code>).
    </p>

    <div id="editor-content">
      <!-- Generated by JS -->
    </div>

    <div class="actions-bar">
      <button class="btn btn-secondary" onclick="generateCode()">Ver Código Generado</button>
      <button class="btn btn-primary" onclick="downloadDataFile()">Descargar data.js</button>
    </div>

    <textarea id="code-output" readonly></textarea>
  </div>

  <script src="js/data.js"></script>
  <script>
    // Build editor layout dynamically from PRODUCT_CATALOG
    const content = document.getElementById('editor-content');
    
    // Check if loaded successfully
    if (typeof PRODUCT_CATALOG === 'undefined') {
      content.innerHTML = '<p style="color:red;font-weight:bold;">Error: No se pudo cargar js/data.js</p>';
    } else {
      PRODUCT_CATALOG.forEach(cat => {
        const sec = document.createElement('div');
        sec.className = 'category-section';
        
        let rowsHtml = '';
        cat.products.forEach(p => {
          rowsHtml += `
            <tr>
              <td style="font-weight:600;">${p.marca}</td>
              <td style="color:var(--text-secondary);">${p.uniCaja} ud</td>
              <td>
                <input type="number" step="0.01" class="price-input" 
                       data-cat="${cat.id}" data-prod="${p.id}" 
                       value="${p.precio.toFixed(2)}"> €
              </td>
            </tr>
          `;
        });
        
        sec.innerHTML = `
          <div class="category-header">${cat.name} (${cat.group.toUpperCase()})</div>
          <table>
            <thead>
              <tr>
                <th>Producto</th>
                <th>Unidades/Caja</th>
                <th>Precio Caja</th>
              </tr>
            </thead>
            <tbody>
              ${rowsHtml}
            </tbody>
          </table>
        `;
        content.appendChild(sec);
      });
    }

    function getUpdatedCatalog() {
      // Clone original catalog
      const updatedCatalog = JSON.parse(JSON.stringify(PRODUCT_CATALOG));
      const inputs = document.querySelectorAll('.price-input');
      
      inputs.forEach(input => {
        const catId = input.getAttribute('data-cat');
        const prodId = input.getAttribute('data-prod');
        const newPrice = parseFloat(input.value) || 0;
        
        const cat = updatedCatalog.find(c => c.id === catId);
        if (cat) {
          const prod = cat.products.find(p => p.id === prodId);
          if (prod) {
            prod.precio = newPrice;
          }
        }
      });
      
      return updatedCatalog;
    }

    function serializeDataFile(catalog) {
      return `// Catálogo de productos Coca-Cola - Actualizado Junio 2026
// ============================================================
// Este archivo debe cargarse ANTES de app.js
// Proporciona: PRODUCT_CATALOG, PRODUCT_GROUPS
// ============================================================

const PRODUCT_GROUPS = ${JSON.stringify(PRODUCT_GROUPS, null, 2)};

const PRODUCT_CATALOG = ${JSON.stringify(catalog, null, 2)};
`;
    }

    function generateCode() {
      const catalog = getUpdatedCatalog();
      const code = serializeDataFile(catalog);
      const output = document.getElementById('code-output');
      output.value = code;
      output.style.display = 'block';
      output.scrollIntoView({ behavior: 'smooth' });
    }

    function downloadDataFile() {
      const catalog = getUpdatedCatalog();
      const code = serializeDataFile(catalog);
      
      const blob = new Blob([code], { type: 'text/javascript;charset=utf-8;' });
      const link = document.createElement("a");
      const url = URL.createObjectURL(blob);
      
      link.setAttribute("href", url);
      link.setAttribute("download", "data.js");
      link.style.visibility = 'hidden';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
  </script>
</body>
</html>
